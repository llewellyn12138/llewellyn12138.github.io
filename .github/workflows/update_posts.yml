name: Deploy Hexo Blog

on:
  push:
    paths:
      - 'posts/**'
      - 'blog-source/**'
      - '.github/workflows/update_posts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        working-directory: blog-source
        run: npm install

      - name: Sync Posts
        run: |
          mkdir -p blog-source/source/_posts
          # Clean existing posts in source to ensure deletions are synced
          rm -rf blog-source/source/_posts/*
          # Copy all files from posts/ to blog-source/source/_posts/
          cp -r posts/* blog-source/source/_posts/

      # - name: Generate Hexo Site
      #   working-directory: blog-source
      #   run: npx hexo generate

      - name: Deploy (Commit generated files)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the generated blog directory
          git add blog/
          
          # Check for changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy Hexo Blog [skip ci]"
            git push
          fi
