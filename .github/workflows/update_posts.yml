name: Deploy Hexo Blog

on:
  push:
    paths:
      - 'posts/**'
      - 'blog-source/**'
      - '.github/workflows/update_posts.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        working-directory: blog-source
        run: npm install

      - name: Sync Posts
        run: |
          mkdir -p blog-source/source/_posts
          # Clean existing posts in source to ensure deletions are synced
          rm -rf blog-source/source/_posts/*
          # Copy all files from posts/ to blog-source/source/_posts/
          cp -r posts/* blog-source/source/_posts/

      - name: Generate Static Files
        working-directory: blog-source
        run: |
          npx hexo clean
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog-source/public
          publish_branch: gh-pages
          commit_message: ${{ github.event.head_commit.message }}
