# --------------------------------------
# Hexo Butterfly 主题配置
# 如果您有任何问题，请参考文档
# 中文: https://butterfly.js.org/
# 英文: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏 Logo 图片
  logo: https://imgbed.llewellyn.top/file/1736148028440_menu-3-370x278.jpg
  display_title: true             # 是否显示标题
  display_post_title: true        # 是否在文章页显示文章标题
  # 是否固定导航栏
  fixed: false

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false
  theme: light
  macStyle: false                 # Mac 风格代码块
  # 代码块高度限制 (单位: px)
  height_limit: false
  word_wrap: false                # 代码自动换行

  # 工具栏
  copy: true                      # 复制代码按钮
  language: true                  # 显示语言
  # true: 收缩代码块 | false: 展开代码块 | none: 展开代码块并隐藏按钮
  shrink: true
  fullpage: false                 # 全屏显示代码块

# 社交媒体链接
# 格式:
#   图标: 链接 || 描述 || 颜色
social:
  fab fa-github: https://github.com/llewellyn12138 || Github || '#24292e'
  fas fa-envelope: mailto:llewellyn@llewellyn.top || Email || '#4a7dbe'
  fab fa-twitter: https://twitter.com/llewellyn12138 || Twitter || '#1da1f2'
  fab fa-telegram-plane: https://t.me/llewellyn12138 || Telegram || '#0088cc'
  fab fa-qq: https://imgbed.llewellyn.top/file/1772161761189_b_8f542b9813c2887582ca456a1bd26d79.jpg || QQ || '#00b200'

  # fab fa-github: https://github.com/xxxxx || Github || '#24292e'
  # fas fa-envelope: mailto:xxxxxx@gmail.com || Email || '#4a7dbe'

# --------------------------------------
# 图片设置
# --------------------------------------

favicon: https://imgbed.llewellyn.top/file/1772161924541_1647477524946.gif

avatar:
  img: https://imgbed.llewellyn.top/file/1736148034547_menu-6-370x278.gif
  effect: true                   # 头像旋转效果

# 禁用所有 Banner 图片
disable_top_img: false

# 如果页面没有设置 Banner，将显示默认的 Banner
default_top_img:

# 首页 Banner
index_img:

# 归档页 Banner
archive_img:

# 注意: 是标签页 (tag page)，不是标签列表页 (tags page)
tag_img:

# 标签页 Banner，可以为每个标签设置 Banner
# 格式:
#  - tag name: xxxxx
tag_per_img:

# 注意: 是分类页 (category page)，不是分类列表页 (categories page)
category_img:

# 分类页 Banner，可以为每个分类设置 Banner
# 格式:
#  - category name: xxxxx
category_per_img:

# 页脚背景图片
footer_img: false

# 网站背景
# 可以设置为颜色、图片 URL 或包含颜色和/或图片 URL 的数组
# 如果提供数组，每次加载时将从数组中随机选择一个背景
background:

cover:
  # 启用/禁用封面
  index_enable: true              # 首页
  aside_enable: true              # 侧边栏
  archives_enable: true           # 归档页
  # 当未设置封面时，显示默认封面
  default_cover:
    # - xxx.jpg

# 替换损坏的图片
error_img:
  flink: /img/friend_404.gif      # 友链图片加载失败时显示
  post_page: /img/404.jpg         # 文章封面加载失败时显示

# 简单的 404 页面
error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: /img/error-page.png

post_meta:
  # 首页文章元数据
  page:
    # 选择: created (发布时间) / updated (更新时间) / both (两者)
    date_type: created
    # 选择: date (日期) / relative (相对时间)
    date_format: date
    categories: true              # 显示分类
    tags: false                   # 显示标签
    label: true                   # 显示标签图标
  post:
    # 选择: left (左对齐) / center (居中)
    position: left
    # 选择: created (发布时间) / updated (更新时间) / both (两者)
    date_type: both
    # 选择: date (日期) / relative (相对时间)
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页 Top_img 设置
# 默认: top_img - 全屏, site_info - 居中
# site_info 的位置, 例如: 300px/300em/300rem/10%
index_site_info_top:
# Top_img 的高度, 例如: 300px/300em/300rem
index_top_img_height:

# 首页副标题
subtitle:
  enable: false
  # 打字机效果
  effect: true
  # 自定义 typed.js
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # 来源 - 调用第三方服务 API (仅限中文)
  # 它将先显示来源，然后显示 sub 的内容
  # 选择: false/1/2/3
  # false - 禁用该功能
  # 1 - hitokoto.cn (一言)
  # 2 - https://api.aa1.cn/doc/yiyan.html
  # 3 - jinrishici.com (今日诗词)
  source: false
  # 如果关闭打字机效果，副标题将仅显示 sub 的第一行
  sub:

# 首页文章布局
# 1: 封面在左，信息在右
# 2: 封面在右，信息在左
# 3: 封面和信息交替显示
# 4: 封面在上，信息在下
# 5: 信息显示在封面上
# 6: 瀑布流布局 - 封面在上，信息在下
# 7: 瀑布流布局 - 信息显示在封面上
index_layout: 3

# 首页文章简介显示
# 1: description (front-matter 中的描述)
# 2: both (如果 description 存在，显示 description，否则显示自动摘要)
# 3: auto_excerpt (自动摘要 - 默认)
# false: 不显示文章简介
index_post_content:
  method: 3
  # 如果您将 method 设置为 2 或 3，需要配置长度
  length: 500

# --------------------------------------
# 文章设置
# --------------------------------------

toc:
  post: true                      # 文章页显示目录
  page: false                     # 普通页面显示目录
  number: true                    # 显示章节编号
  expand: false                   # 默认展开目录
  # 仅针对文章
  style_simple: false             # 简约风格
  scroll_percent: true            # 显示滚动百分比

post_copyright:
  enable: true                    # 开启文章版权信息
  decode: false                   # 解码作者链接
  author_href:                    # 作者链接
  license: CC BY-NC-SA 4.0        # 版权协议
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/ # 协议链接

# 赞赏
reward:
  enable: false
  text:                           # 赞赏描述文字
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# 文章编辑
# 在线浏览和编辑博客源码
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 例如: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关文章
related_post:
  enable: true
  # 显示的文章数量
  limit: 6
  # 选择: created (发布时间) / updated (更新时间)
  date_type: created

# 选择: 1 / 2 / false
# 1: '下一篇' 链接到旧文章
# 2: '下一篇' 链接到新文章
# false: 禁用分页
post_pagination: 1

# 显示文章过时提醒
noticeOutdate:
  enable: false
  # 样式: simple / flat
  style: flat
  # 何时显示 (天)
  limit_day: 365
  # 位置: top / bottom
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025                   # 建站年份
  # 主题和框架版权信息
  copyright:
    enable: true
    version: true
  custom_text:                    # 自定义页脚文字

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true
  hide: false
  # 在右下角显示隐藏侧边栏的按钮
  button: true
  mobile: true                    # 移动端是否显示
  # 位置: left / right
  position: right
  display:
    archive: true                 # 显示归档
    tag: true                     # 显示标签
    category: true                # 显示分类
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/xxxxxx
  card_announcement:
    enable: true
    content: This is my Blog
  card_recent_post:
    enable: true
    # 如果设置为 0 将显示所有
    limit: 5
    # 排序: date / updated
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 单位: 分钟, 保存数据到 localStorage
    storage: 10
    avatar: true
  card_categories:
    enable: true
    # 如果设置为 0 将显示所有
    limit: 8
    # 选择: none / true / false
    expand: none
    sort_order:
  card_tags:
    enable: true
    # 如果设置为 0 将显示所有
    limit: 40
    color: false                  # 彩色标签
    custom_colors:
    # 标签排序, random/name/length
    orderby: random
    # 排序顺序. 1, asc 升序; -1, desc 降序
    order: 1
    sort_order:
  card_archives:
    enable: true
    # 类型: monthly (按月) / yearly (按年)
    type: monthly
    # 例如: YYYY年MM月
    format: MMMM YYYY
    # 排序顺序. 1, asc 升序; -1, desc 降序
    order: -1
    # 如果设置为 0 将显示所有
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    # 标题显示系列名称
    series_title: false
    # 按标题或日期排序
    orderBy: 'date'
    # 排序顺序. 1, asc 升序; -1, desc 降序
    order: -1
  card_webinfo:
    enable: true
    post_count: true              # 文章总数
    last_push_date: true          # 最后更新时间
    sort_order:
    # 建站时间差
    # 格式: Month/Day/Year Time 或 Year/Month/Day Time
    # 如果不启用此功能，请留空
    runtime_date:

# --------------------------------------
# 右下角按钮
# --------------------------------------

# 右下角按钮距离底部的距离 (默认单位: px)
rightside_bottom:

# 繁简转换
translate:
  enable: false
  # 按钮文本
  default: 繁
  # 网站语言 (1 - 繁体中文 / 2 - 简体中文)
  defaultEncoding: 2
  # 转换延迟
  translateDelay: 0
  # 当语言为简体中文时，按钮显示的文本
  msgToTraditionalChinese: '繁'
  # 当语言为繁体中文时，按钮显示的文本
  msgToSimplifiedChinese: '簡'

# 阅读模式
readmode: true

#深色模式 (Dark Mode)
darkmode:
  enable: true
  # 切换深色/浅色模式的按钮
  button: true
  # 自动切换深色/浅色模式
  # autoChangeMode: 1  跟随系统设置，如果系统不支持深色模式，则在晚 6 点到早 6 点之间切换为深色模式
  # autoChangeMode: 2  在晚 6 点到早 6 点之间切换为深色模式
  # autoChangeMode: false 禁用自动切换
  autoChangeMode: false
  # 设置浅色模式时间。值在 0 到 24 之间。如果未设置，默认值为 6 和 18
  start:
  end:

# 在回到顶部按钮中显示滚动百分比
rightside_scroll_percent: false

# 除非您知道如何操作，否则请勿修改以下设置
# 选择: readmode,translate,darkmode,hideAside,toc,chat,comment
# 请勿重复相同的值
rightside_item_order:
  enable: false
  # 默认: readmode,translate,darkmode,hideAside
  hide:
  # 默认: toc,chat,comment
  show:

# 右下角配置按钮动画
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 滚动时，URL 将根据标题 ID 更新
  auto_update: false
  # 点击标题滚动并更新锚点
  click_to_scroll: false

photofigcaption: false            # 图片标题

copy:
  enable: true
  # 复制内容后添加版权信息
  copyright:
    enable: false
    limit_count: 150

# 需要安装 hexo-wordcount 插件
wordcount:
  enable: false
  # 在文章元数据中显示文章字数
  post_wordcount: true
  # 在文章元数据中显示阅读时长
  min2read: true
  # 在侧边栏网站信息中显示站点总字数
  total_wordcount: true

# 不蒜子统计 (PV / UV)
busuanzi:
  site_uv: true                   # 访客数
  site_pv: true                   # 访问量
  page_pv: true                   # 文章阅读量

# --------------------------------------
# 数学公式
# --------------------------------------

# 关于 per_page
# 如果设置为 true，将在每个页面加载 mathjax/katex 脚本
# 如果设置为 false，将根据您的设置加载 mathjax/katex 脚本 (在页面的 front-matter 中添加 'mathjax: true' 或 'katex: true')
math:
  # 选择: mathjax, katex
  # 如果不需要数学公式，请留空
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    # 启用上下文菜单
    enableMenu: true
    # 选择: all / ams / none, 控制公式是否编号以及如何编号
    tags: none

  katex:
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 选择: algolia_search / local_search / docsearch
  # 如果不需要搜索，请留空
  use:
  placeholder:

  # Algolia Search
  algolia_search:
    # 每页搜索结果数量
    hitsPerPage: 6

  # Local Search (本地搜索)
  local_search:
    # 页面加载时预加载搜索数据
    preload: false
    # 每篇文章显示前 n 个结果，设置为 -1 显示所有结果
    top_n_per_article: 1
    # 将 html 字符串转义为可读字符串
    unescape: false
    # 启用搜索结果分页
    pagination:
      enable: false
      # 每页搜索结果数量
      hitsPerPage: 8
    CDN:

  # Docsearch
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 选择: sharejs / addtoany
  # 如果不需要分享，请留空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多支持两个评论系统，第一个将作为默认显示
  # 如果不需要评论，请留空
  # 选择: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两个评论系统的格式: Disqus,Waline
  use:
  # 在按钮旁显示评论名称
  text: true
  # 懒加载: 当评论元素进入浏览器视口时加载评论系统
  # 如果设置为 true，评论计数将无效
  lazyload: false
  # 在文章 Top_img 中显示评论数
  count: false
  # 在首页显示评论数
  card_post_count: false

# Disqus
# https://disqus.com/
disqus:
  shortname:
  # 用于最新评论小部件
  apikey:

# Alternative Disqus - 使用 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere (来必力)
# https://www.livere.com/
livere:
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版本将自动检测 (无需手动填写)
  serverURLs:
  bg:
  # 使用 Valine 访客统计作为页面浏览量
  visitor: false
  option:

# Waline - 一个简单的带有后端支持的评论系统 (fork 自 Valine)
# https://waline.js.org/
waline:
  serverURL:
  bg:
  # 使用 Waline 浏览量统计作为页面浏览量
  pageview: false
  option:

# Utterances
# https://utteranc.es/
utterances:
  repo:
  # Issue 映射: pathname/url/title/og:title
  issue_term: pathname
  # 主题: github-light/github-dark/github-dark-orange/icy-dark/dark-blue/photon-dark
  light_theme: github-light
  dark_theme: photon-dark
  js:
  option:

# Facebook Comments Plugin
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  app_id:
  # 可选
  user_id:
  pageSize: 10
  # 选择: social / time / reverse_time
  order_by: social
  lang: en_US

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  envId:
  region:
  # 使用 Twikoo 访客统计作为页面浏览量
  visitor: false
  option:

# Giscus
# https://giscus.app/
giscus:
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

# Remark42
# https://remark42.com/docs/configuration/frontend/
remark42:
  host:
  siteId:
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  # 使用 Artalk 访客统计作为页面浏览量
  visitor: false
  option:

# --------------------------------------
# 聊天服务
# --------------------------------------

chat:
  # 选择: chatra/tidio/crisp
  # 如果不需要聊天，请留空
  use:
  # 聊天按钮 [推荐]
  # 它将在网站右下角创建一个按钮，并隐藏原始按钮
  rightside_button: false
  # 向上滚动时显示原始聊天按钮，向下滚动时隐藏按钮
  button_hide_show: false

# https://chatra.io/
chatra:
  id:

# https://www.tidio.com/
tidio:
  public_key:

# https://crisp.chat/en/
crisp:
  website_id:

# --------------------------------------
# 分析
# --------------------------------------

# https://tongji.baidu.com/web/welcome/login
baidu_analytics:

# https://analytics.google.com/analytics/web/
google_analytics:

# https://www.cloudflare.com/zh-tw/web-analytics/
cloudflare_analytics:

# https://clarity.microsoft.com/
microsoft_clarity:

# https://umami.is/
umami_analytics:
  enable: false
  # 对于自托管设置，配置 Umami 实例的主机名
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    # Umami Cloud (API key) / self-hosted Umami (token)
    token:

# https://www.googletagmanager.com/
google_tag_manager:
  tag_id:
  # 可选
  domain:

# --------------------------------------
# 广告
# --------------------------------------

# Google Adsense
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动插入广告
# 如果不需要广告，请留空
ad:
  # 在首页插入广告 (每三篇文章)
  index:
  # 在侧边栏插入广告
  aside:
  # 在文章中插入广告 (分页前)
  post:

# --------------------------------------
# 验证
# --------------------------------------

site_verification:
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# --------------------------------------
# 美化 / 效果
# --------------------------------------

# 自定义主题颜色
# 注意: 颜色值必须在双引号中，如 "#000"，否则可能会导致错误!

# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类和标签页的用户界面设置
# 选择: index - 与首页 UI 相同 / default - 与归档 UI 相同
# 留空或 index
category_ui:
tag_ui:

# UI 元素圆角
rounded_corners_ui: true

# 拉伸行使每行宽度相等
text_align_justify: false

# 给页眉和页脚添加遮罩
mask:
  header: true
  footer: true

# 加载动画
preloader:
  enable: false
  # 来源
  # 1. fullpage-loading (全屏加载)
  # 2. pace (进度条)
  source: 1
  # pace 主题 (见 https://codebyzach.github.io/pace/)
  pace_css_url:

# 页面过渡
enter_transitions: true

# 默认显示模式 - light (浅色 - 默认) / dark (深色)
display_mode: light

# 美化文章内容配置
beautify:
  enable: false
  # 指定要美化的字段 (site 或 post)
  field: post
  # 指定用作标题前缀的图标，例如 '\f0c1'
  title_prefix_icon:
  # 指定标题前缀图标的颜色，例如 '#F47466'
  title_prefix_icon_color:

# 全局字体设置
# 除非您知道如何操作，否则请勿修改以下设置
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 网站标题和副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分割线图标设置
hr_icon:
  enable: true
  # Font Awesome 图标的 unicode 值，例如 '\3423'
  icon:
  icon_top:

# 打字机效果
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# 背景效果
# --------------------------------------

# canvas_ribbon (彩带)
# 见: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 彩带大小
  size: 150
  # 彩带透明度 (0 ~ 1)
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# Fluttering Ribbon (飘带)
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# canvas_nest (线条)
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false
  # 线条颜色, 默认: '0,0,0'; RGB 值: (R,G,B).(注意: 使用 ',' 分隔)
  color: '0,0,255'
  # 线条透明度 (0~1)
  opacity: 0.7
  # 背景的 z-index 属性
  zIndex: -1
  # 线条数量
  count: 99
  mobile: false

# 鼠标点击效果: 烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击效果: 爱心
click_heart:
  enable: false
  mobile: false

# 鼠标点击效果: 文字
clickShowText:
  enable: false
  text:
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# Lightbox 设置 (图片灯箱)
# --------------------------------------

# 选择: fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 如果不需要 Lightbox，请留空
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列文章
series:
  enable: false
  # 按标题或日期排序
  orderBy: 'title'
  # 排序顺序. 1, asc 升序; -1, desc 降序
  order: 1
  number: true

# ABCJS - ABC 乐谱插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid (流程图等)
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # 使用代码块编写 Mermaid 图表
  code_write: false
  # 内置主题: default / forest / dark / neutral
  theme:
    light: default
    dark: dark
  # 启用 "在新标签页打开" 按钮以在单独窗口查看图表
  open_in_new_tab: true
  # 启用图表的缩放和平移交互
  zoom_pan: true

# chartjs (图表)
# 见 https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 除非您了解其工作原理，否则请勿修改。
  # 默认设置仅在未指定 MD 语法时使用。
  # 图表的一般字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表的一般边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图和极坐标区域图上刻度标签的背景颜色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note - Bootstrap Callout (提示块)
note:
  # Note 标签样式值:
  #  - simple    bs-callout 旧版警告样式。默认。
  #  - modern    bs-callout 新版 (v2-v3) 警告样式。
  #  - flat      扁平 callout 样式，带背景，类似于 Mozilla 或 StackOverflow。
  #  - disabled  禁用 note 标签的所有 CSS 样式导入。
  style: flat
  icons: true
  border_radius: 3
  # 浅色背景偏移量 % (modern: -12 | 12; flat: -18 | 6)。
  # 偏移量也应用于标签变量。此选项可与禁用的 note 标签一起使用。
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# https://github.com/MoOx/pjax
pjax:
  enable: false
  # 从 pjax 中排除指定页面，例如 '/music/'
  exclude:
    # - /xxxxxx/

# 注入 css 和 script (aplayer/meting)
aplayerInject:
  enable: false
  per_page: true

# Snackbar - Toast 通知
# https://github.com/polonel/SnackBar
# 位置: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  enable: false
  position: bottom-left
  # 浅色模式和深色模式下的通知背景颜色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant.page (预加载)
# https://instant.page/
instantpage: false

# Lazyload (图片懒加载)
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: false
  # 使用浏览器的原生懒加载代替 vanilla-lazyload
  native: false
  # 指定使用懒加载的字段 (site 或 post)
  field: site
  placeholder:
  blur: false

# PWA
# 见 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

# Open graph 元标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  enable: true
  option:
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

# 结构化数据
# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: false
  # 网站的替代名称，用于结构化数据
  # 格式: ['name1', 'name2']
  alternate_name:

# 添加供应商前缀以确保兼容性
css_prefix: true

# 注入
# 将代码插入到 head (在 '</head>' 标签前) 和 bottom (在 '</body>' 标签前)
inject:
  head:
    - <link rel="stylesheet" href="/blog/css/scrollbar.css">
  bottom:
    - <script src="/blog/js/background-slideshow.js"></script>

# CDN 设置
# 除非您知道如何操作，否则请勿修改以下设置
CDN:
  # 内部和第三方脚本的 CDN 提供商
  # 两者的选项: local/jsdelivr/unpkg/cdnjs/custom
  # 注意: 开发版本只能对内部脚本使用 'local'
  # 注意: 将第三方脚本设置为 'local' 时，需要安装 hexo-butterfly-extjs
  internal_provider: local
  third_party_provider: jsdelivr

  # 是否在 url 中添加版本号, true 或 false
  version: true

  # 自定义格式
  # 例如: https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format:

  option:
    # abcjs_basic_js:
    # activate_power_mode:
    # algolia_js:
    # algolia_search:
    # aplayer_css:
    # aplayer_js:
    # artalk_css:
