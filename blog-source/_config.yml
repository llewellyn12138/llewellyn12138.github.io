# Hexo 配置
## 文档: https://hexo.io/docs/configuration.html
## 源码: https://github.com/hexojs/hexo/

# 站点信息
title: Llewellyn's Blog          # 网站标题
subtitle: Cheeeeems              # 网站副标题
description: 随便记点啥           # 网站描述
keywords: coding, tech, notes    # 网站关键词
author: Llewellyn                # 作者名字
language: zh-CN                  # 网站语言
timezone: ''                     # 时区
email: llewellyn@llewellyn.top   # 作者邮箱

# URL 设置
##在这里设置您的网站 url。例如，如果您使用 GitHub Page，则将 url 设置为“https://username.github.io/project”
url: https://llewellyn12138.github.io/blog
root: /blog/                     # 网站根目录
permalink: :year/:month/:day/:title/ # 文章永久链接格式
permalink_defaults:
pretty_urls:
  trailing_index: true           # 是否保留末尾的 index.html
  trailing_html: true            # 是否保留末尾的 .html

# 目录设置
source_dir: source               # 资源文件夹，这个文件夹用来存放您的内容
public_dir: ../blog              # 公共文件夹，这个文件夹用于存放生成的静态文件
tag_dir: tags                    # 标签文件夹
archive_dir: archives            # 归档文件夹
category_dir: categories         # 分类文件夹
code_dir: downloads/code         # 代码文件夹
i18n_dir: :lang                  # 国际化文件夹
skip_render:                     # 跳过渲染的文件或文件夹

# 文章写作设置
new_post_name: :title.md         # 新文章的文件名格式
default_layout: post             # 默认布局
titlecase: false                 # 是否将标题转换为标题大小写
external_link:
  enable: true                   # 是否在新标签页中打开外部链接
  field: site                    # 应用范围：site (全站) 或 post (仅文章)
  exclude: ''                    # 排除的域名
filename_case: 0                 # 文件名大小写：0 (不变), 1 (小写)
render_drafts: false             # 是否渲染草稿
post_asset_folder: false         # 是否启动资源文件夹
relative_link: false             # 是否使用相对链接
future: true                     # 是否显示未来的文章
highlight:                       # 代码高亮设置
  enable: true
  line_number: true              # 显示行号
  auto_detect: false             # 自动检测语言
  tab_replace: ''                # Tab 替换
  wrap: true                     # 是否换行
  hljs: false                    # 是否使用 hljs
prismjs:                         # PrismJS 代码高亮设置
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# 首页分页设置
# path: 博客索引页面的根路径 (默认 = '')
# per_page: 每页显示的文章数 (0 = 关闭分页)
# order_by: 文章排序方式 (默认按日期降序)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类 & 标签
default_category: uncategorized  # 默认分类
category_map:                    # 分类别名映射
tag_map:                         # 标签别名映射

# 元数据元素
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# 日期 / 时间格式
## Hexo 使用 Moment.js 来解析和显示日期
## https://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD          # 日期格式
time_format: HH:mm:ss            # 时间格式
## updated_option 支持 'mtime' (修改时间), 'date' (日期), 'empty' (空)
updated_option: 'mtime'

# 分页设置
## 将 per_page 设置为 0 可禁用分页
per_page: 10                     # 每页显示的文章数
pagination_dir: page             # 分页目录

# 包含 / 排除文件
## include:/exclude: 选项仅适用于 'source/' 文件夹
include:
exclude:
ignore:

# 扩展
## 插件: https://hexo.io/plugins/
## 主题: https://hexo.io/themes/
theme: butterfly                 # 当前使用的主题

# 部署
## 文档: https://hexo.io/docs/one-command-deployment
deploy:
  type: ''
